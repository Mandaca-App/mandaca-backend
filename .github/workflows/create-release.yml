name: Create GitHub Release

on:
  push:
    branches: [main]

jobs:
  tag-and-release:
    name: Tag and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Ler versao atual
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verificar se tag ja existe
        id: check-tag
        run: |
          git fetch --tags origin
          if git tag --list | grep -q "^v${{ steps.version.outputs.version }}$"; then
            echo "Tag v${{ steps.version.outputs.version }} ja existe. Nenhuma release sera criada."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Criar tag git
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Criar GitHub Release
        if: steps.check-tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest \
            --title "Release v${{ steps.version.outputs.version }}"
